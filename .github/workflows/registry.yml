# Builds the shadcn registry and publishes it to GitHub Pages on every
# push to main. Enable once: Settings → Pages → Source: GitHub Actions.
#
# `shadcn build` only reads registry.json + the source files, so there is
# no project install and no lockfile — npx fetches the pinned CLI.

name: Build and publish registry

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build registry
        run: npx --yes shadcn@2.10.0 build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
